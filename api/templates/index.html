<!DOCTYPE html>
<html>
<head>
    <title>Product Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f4f4f4;
        }
        h1 {
            text-align: center;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<h1>Product Dashboard</h1>

<div id="products"></div>

<script>
fetch('/products')
.then(res => res.json())
.then(data => {
    let container = document.getElementById('products');
    data.forEach(p => {
        container.innerHTML += `
            <div class="card">
                <h3>${p.name}</h3>
                <p>Price: ${p.price}</p>
                <p>Rating: ${p.rating}</p>
            </div>
        `;
    });
});
</script>

</body>
</html>
